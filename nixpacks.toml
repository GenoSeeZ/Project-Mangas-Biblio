[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_mysql", "php83Extensions.intl", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.iconv", "composer"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "php bin/console doctrine:migrations:migrate --no-interaction --env=prod"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public/"